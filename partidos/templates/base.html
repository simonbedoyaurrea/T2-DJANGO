<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>World Cup 2026</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gray-200">
    <div class="flex">
      <div
        class="w-60 h-screen fixed bg-gray-100 border-r border-gray-200 flex flex-col p-3 gap-1 overflow-y-auto"
      >
        <!-- Logo -->
        <div class="px-2 pb-3 mb-1 border-b border-gray-200">
          <img
            src="https://paladarnegro.net/escudoteca/copas/copamundial/png/mundial_2026.png"
            alt="Mundial 2026"
            class="w-28 mx-auto"
          />
        </div>

        <!-- Featured links -->
        <a
          href="/matches"
          class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-medium bg-white border border-gray-200 hover:bg-gray-50 transition-colors"
        >
          📅 Partidos
        </a>
        <a
          href="/playoffs"
          class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-medium bg-white border border-gray-200 hover:bg-gray-50 transition-colors"
        >
          🏆 Playoffs
        </a>

        <hr class="my-1 border-gray-200" />

        <!-- Grupos toggle -->
        <button
          onclick="toggleSection(this, 'groups')"
          class="flex items-center justify-between px-2 py-1.5 rounded-md hover:bg-white transition-colors group"
        >
          <span
            class="text-xs font-semibold uppercase tracking-widest text-gray-400"
            >Grupos</span
          >
          <span
            id="chevron-groups"
            class="text-gray-300 text-xs transition-transform duration-200"
            >▼</span
          >
        </button>

        <!-- Grid de grupos -->
        <div id="groups" class="grid grid-cols-2 gap-0.5">
          <a
            href="/grupo/A"
            class="flex items-center gap-1.5 px-2 py-1.5 rounded-md text-sm hover:bg-white transition-colors"
            >⚽ <span class="font-medium">Grupo A</span></a
          >
          <a
            href="/grupo/B"
            class="flex items-center gap-1.5 px-2 py-1.5 rounded-md text-sm hover:bg-white transition-colors"
            >⚽ <span class="font-medium">Grupo B</span></a
          >
          <a
            href="/grupo/C"
            class="flex items-center gap-1.5 px-2 py-1.5 rounded-md text-sm hover:bg-white transition-colors"
            >⚽ <span class="font-medium">Grupo C</span></a
          >
          <a
            href="/grupo/D"
            class="flex items-center gap-1.5 px-2 py-1.5 rounded-md text-sm hover:bg-white transition-colors"
            >⚽ <span class="font-medium">Grupo D</span></a
          >
          <a
            href="/grupo/E"
            class="flex items-center gap-1.5 px-2 py-1.5 rounded-md text-sm hover:bg-white transition-colors"
            >⚽ <span class="font-medium">Grupo E</span></a
          >
          <a
            href="/grupo/F"
            class="flex items-center gap-1.5 px-2 py-1.5 rounded-md text-sm hover:bg-white transition-colors"
            >⚽ <span class="font-medium">Grupo F</span></a
          >
          <a
            href="/grupo/G"
            class="flex items-center gap-1.5 px-2 py-1.5 rounded-md text-sm hover:bg-white transition-colors"
            >⚽ <span class="font-medium">Grupo G</span></a
          >
          <a
            href="/grupo/H"
            class="flex items-center gap-1.5 px-2 py-1.5 rounded-md text-sm hover:bg-white transition-colors"
            >⚽ <span class="font-medium">Grupo H</span></a
          >
          <a
            href="/grupo/I"
            class="flex items-center gap-1.5 px-2 py-1.5 rounded-md text-sm hover:bg-white transition-colors"
            >⚽ <span class="font-medium">Grupo I</span></a
          >
          <a
            href="/grupo/J"
            class="flex items-center gap-1.5 px-2 py-1.5 rounded-md text-sm hover:bg-white transition-colors"
            >⚽ <span class="font-medium">Grupo J</span></a
          >
          <a
            href="/grupo/K"
            class="flex items-center gap-1.5 px-2 py-1.5 rounded-md text-sm hover:bg-white transition-colors"
            >⚽ <span class="font-medium">Grupo K</span></a
          >
          <a
            href="/grupo/L"
            class="flex items-center gap-1.5 px-2 py-1.5 rounded-md text-sm hover:bg-white transition-colors"
            >⚽ <span class="font-medium">Grupo L</span></a
          >
        </div>
      </div>

      <!-- CONTENT -->
      <div class="flex-1 p-10 ml-64">{% block content %} {% endblock %}</div>
    </div>

    <script>
      function toggleMenu(menuId) {
        const menu = document.getElementById(menuId);
        menu.classList.toggle("hidden");
      }
    </script>
  </body>
</html>

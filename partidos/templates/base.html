<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>World Cup 2026</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body
    class="bg-black"
    style="
      background-image: url(&quot;https://www.transparenttextures.com/patterns/fabric-of-squares.png&quot;);
    "
  >
    <div class="flex">
      <div
        class="w-60 h-screen fixed border-r-8 border-lime-200 flex flex-col p-3 gap-1 overflow-y-auto bg-black text-white"
      >
        <!-- Logo -->
        <div class="px-2 pb-3 mb-1 border-b border-gray-200">
          <img
            src="https://i.pinimg.com/736x/84/fb/1f/84fb1f25a40b3205474734f2820187c6.jpg"
            alt="Mundial 2026"
            class="w-28 mx-auto bg-white"
          />
        </div>

        <a
          href="/playoffs"
          class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-medium bg-purple-400 border-2 border-lime-400 hover:bg-purple-500 transition-colors"
        >
          Playoffs
        </a>

        <hr class="my-1 border-gray-200" />

        <!-- Grupos toggle -->
        <button
          onclick="toggleSection(this, 'groups')"
          class="flex items-center justify-between px-2 py-1.5 rounded-md transition-colors group"
        >
          <span
            class="text-xs font-semibold uppercase tracking-widest text-gray-400"
            >Grupos</span
          >
          <span
            id="chevron-groups"
            class="text-gray-300 text-xs transition-transform duration-200"
          ></span>
        </button>

        <!-- Grid de grupos -->
        <div id="groups" class="grid grid-cols-2 gap-0.5">
          <a
            href="/grupo/A"
            class="flex items-center gap-1.5 px-2 py-1.5 rounded-md text-sm hover:bg-lime-500 transition-colors"
            ><span class="font-medium">Grupo A</span></a
          >
          <a
            href="/grupo/B"
            class="flex items-center gap-1.5 px-2 py-1.5 rounded-md text-sm hover:bg-lime-500 transition-colors"
            ><span class="font-medium">Grupo B</span></a
          >
          <a
            href="/grupo/C"
            class="flex items-center gap-1.5 px-2 py-1.5 rounded-md text-sm hover:bg-lime-500 transition-colors"
            ><span class="font-medium">Grupo C</span></a
          >
          <a
            href="/grupo/D"
            class="flex items-center gap-1.5 px-2 py-1.5 rounded-md text-sm hover:bg-lime-500 transition-colors"
            ><span class="font-medium">Grupo D</span></a
          >
          <a
            href="/grupo/E"
            class="flex items-center gap-1.5 px-2 py-1.5 rounded-md text-sm hover:bg-lime-500 transition-colors"
            ><span class="font-medium">Grupo E</span></a
          >
          <a
            href="/grupo/F"
            class="flex items-center gap-1.5 px-2 py-1.5 rounded-md text-sm hover:bg-lime-500 transition-colors"
            ><span class="font-medium">Grupo F</span></a
          >
          <a
            href="/grupo/G"
            class="flex items-center gap-1.5 px-2 py-1.5 rounded-md text-sm hover:bg-lime-500 transition-colors"
            ><span class="font-medium">Grupo G</span></a
          >
          <a
            href="/grupo/H"
            class="flex items-center gap-1.5 px-2 py-1.5 rounded-md text-sm hover:bg-lime-500 transition-colors"
            ><span class="font-medium">Grupo H</span></a
          >
          <a
            href="/grupo/I"
            class="flex items-center gap-1.5 px-2 py-1.5 rounded-md text-sm hover:bg-lime-500 transition-colors"
            ><span class="font-medium">Grupo I</span></a
          >
          <a
            href="/grupo/J"
            class="flex items-center gap-1.5 px-2 py-1.5 rounded-md text-sm hover:bg-lime-500 transition-colors"
            ><span class="font-medium">Grupo J</span></a
          >
          <a
            href="/grupo/K"
            class="flex items-center gap-1.5 px-2 py-1.5 rounded-md text-sm hover:bg-lime-500 transition-colors"
            ><span class="font-medium">Grupo K</span></a
          >
          <a
            href="/grupo/L"
            class="flex items-center gap-1.5 px-2 py-1.5 rounded-md text-sm hover:bg-lime-500 transition-colors"
            ><span class="font-medium">Grupo L</span></a
          >
        </div>
      </div>

      <!-- CONTENT -->
      <div class="flex-1 p-10 ml-64">{% block content %} {% endblock %}</div>
    </div>

    <script>
      function toggleMenu(menuId) {
        const menu = document.getElementById(menuId);
        menu.classList.toggle("hidden");
      }
    </script>
  </body>
</html>
